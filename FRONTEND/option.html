<!DOCTYPE html>
<html>
<head>
    <title>Select Feature</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        .container {
            padding: 100px 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 36px;
            background: linear-gradient(to right, #00f5ff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 40px;
            width: 250px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.15);
        }

        .card h3 {
            margin-bottom: 15px;
        }

        .card p {
            font-size: 14px;
            opacity: 0.8;
        }

        .back {
            display: inline-block;
            margin-top: 60px;
            text-decoration: none;
            color: #00ffcc;
        }

        @media (max-width: 768px) {
            .cards {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Select Learning Mode</h1>

    <div class="cards">

        <a href="level.html" class="card">
            <h3>❓ Generate Quiz</h3>
            <p>Create practice questions from your study material.</p>
        </a>

        <a href="elaborate.html" class="card">
            <h3>📘 Elaborate</h3>
            <p>Get detailed explanation of topics from your study material.</p>
        </a>

        <a href="summarize.html" class="card">
            <h3>📄 Summarize</h3>
            <p>Convert long PDFs into short structured notes.</p>
        </a>

    </div>

    <a href="homepage.html" class="back">⬅ Back to Home</a>
</div>

</body>
</html>
